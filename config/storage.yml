<% if Rails.env.test? %>
test:
  service: Disk
  root:    <%= Rails.root.join('tmp/storage') %>
<% else %>
garage:
  service:           S3
  endpoint:          <%= Rails.application.config_for(:garage).endpoint %>
  force_path_style:  true
  bucket:            uploads
  access_key_id:     '<%= Rails.application.config_for(:garage).api_key %>'
  secret_access_key: '<%= Rails.application.config_for(:garage).secret_key %>'
  region:            garage
<% end %>
